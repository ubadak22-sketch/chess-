<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovаChess — Multiplayer Chess</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ─── AUTH SCREEN ─── -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="board-pattern"></div>
    </div>
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-king">♔</span>
        <h1>NovaChess</h1>
        <p class="logo-sub">Global Multiplayer</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <div id="tab-login" class="tab-panel active">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" />
        </div>
        <button class="btn-primary" id="login-btn">
          <span>Sign In</span>
          <span class="btn-arrow">→</span>
        </button>
        <div id="login-error" class="error-msg hidden"></div>
      </div>

      <!-- Register Form -->
      <div id="tab-register" class="tab-panel">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Choose a password" autocomplete="new-password" />
        </div>
        <button class="btn-primary" id="register-btn">
          <span>Create Account</span>
          <span class="btn-arrow">→</span>
        </button>
        <div id="register-error" class="error-msg hidden"></div>
      </div>
    </div>
  </div>

  <!-- ─── DASHBOARD SCREEN ─── -->
  <div id="dashboard-screen" class="screen">
    <header class="dash-header">
      <div class="dash-logo">
        <span class="logo-king-sm">♔</span>
        <span class="dash-title">NovaChess</span>
      </div>
      <div class="dash-user">
        <div class="user-info">
          <span id="dash-username" class="user-name">—</span>
          <span id="dash-rating" class="user-rating">★ —</span>
        </div>
        <button class="btn-logout" id="logout-btn" title="Logout">⏻</button>
      </div>
    </header>

    <main class="dash-main">
      <!-- Quick Actions -->
      <section class="dash-actions">
        <button class="action-card action-create" id="create-room-btn">
          <span class="action-icon">⊕</span>
          <span class="action-label">Create Room</span>
          <span class="action-sub">Start a new game</span>
        </button>
        <div class="action-card action-join">
          <span class="action-icon">⊞</span>
          <span class="action-label">Join Room</span>
          <span class="action-sub">Enter room code</span>
          <div class="join-input-row">
            <input type="text" id="join-code-input" placeholder="Room code..." maxlength="10" />
            <button class="btn-join" id="join-room-btn">Join</button>
          </div>
        </div>
      </section>

      <!-- Tabs -->
      <div class="dash-tabs">
        <button class="dash-tab-btn active" data-dtab="rooms">Available Rooms</button>
        <button class="dash-tab-btn" data-dtab="leaderboard">Leaderboard</button>
      </div>

      <!-- Rooms List -->
      <div id="dtab-rooms" class="dash-tab-panel active">
        <div id="rooms-list" class="rooms-list">
          <div class="loading-state">Loading rooms…</div>
        </div>
        <button class="btn-refresh" id="refresh-rooms-btn">↻ Refresh</button>
      </div>

      <!-- Leaderboard -->
      <div id="dtab-leaderboard" class="dash-tab-panel">
        <div id="leaderboard-list" class="leaderboard-list">
          <div class="loading-state">Loading…</div>
        </div>
      </div>
    </main>
  </div>

  <!-- ─── GAME SCREEN ─── -->
  <div id="game-screen" class="screen">
    <header class="game-header">
      <button class="btn-back" id="leave-game-btn">← Leave</button>
      <div class="game-title-area">
        <span class="game-room-id" id="game-room-label">Room: —</span>
      </div>
      <div class="connection-dot" id="connection-dot" title="Disconnected"></div>
    </header>

    <div class="game-layout">
      <!-- Left: Board + Info -->
      <div class="game-left">
        <!-- Opponent Info -->
        <div class="player-bar opponent-bar">
          <div class="player-avatar opponent-avatar">♚</div>
          <div class="player-details">
            <span class="player-name" id="opponent-name">Waiting…</span>
            <span class="player-rating" id="opponent-rating"></span>
          </div>
          <div class="player-turn-dot" id="opponent-turn-dot"></div>
        </div>

        <!-- Chess Board -->
        <div class="board-wrapper">
          <div class="board-coords-left" id="board-ranks"></div>
          <div id="chess-board" class="chess-board"></div>
          <div class="board-coords-right" id="board-ranks-right"></div>
        </div>
        <div class="board-coords-bottom" id="board-files"></div>

        <!-- Self Info -->
        <div class="player-bar self-bar">
          <div class="player-avatar self-avatar">♔</div>
          <div class="player-details">
            <span class="player-name" id="self-name">You</span>
            <span class="player-rating" id="self-rating-game"></span>
          </div>
          <div class="player-turn-dot" id="self-turn-dot"></div>
        </div>

        <!-- Status Bar -->
        <div class="game-status" id="game-status">
          <span id="status-text">Waiting for opponent…</span>
        </div>
      </div>

      <!-- Right: Chat -->
      <div class="game-right">
        <div class="chat-panel">
          <div class="chat-header">
            <span>Chat</span>
            <span class="chat-online" id="chat-online">● Online</span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Type a message…" maxlength="200" />
            <button class="btn-send" id="chat-send-btn">↑</button>
          </div>
        </div>

        <!-- Move History -->
        <div class="moves-panel">
          <div class="moves-header">Move History</div>
          <div class="moves-list" id="moves-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── GAME OVER MODAL ─── -->
  <div id="game-over-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-icon" id="modal-icon">♛</div>
      <h2 id="modal-title">Game Over</h2>
      <p id="modal-body">—</p>
      <button class="btn-primary" id="modal-back-btn">Back to Dashboard</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
